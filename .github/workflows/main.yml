name: Main Workflow

on:
  pull_request: {}
  workflow_dispatch: {}
  push:
    branches:
      - '*'
    tags-ignore:
      - 'v*'
    paths-ignore:
      - 'docs/*'

permissions:
  contents: read

jobs:
  go-versions:
    name: Lookup go versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.versions.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: arnested/go-version-action@v2
        id: versions
  build:
    name: Build Shoutrrr
    runs-on: ubuntu-latest
    needs: go-versions
    strategy:
      matrix:
        version: ${{ fromJSON(needs.go-versions.outputs.matrix) }}
    steps:
      - name: Set up Go ${{ matrix.version }}
        uses: actions/setup-go@v6
        id: go
        with:
          go-version: ${{ matrix.version }}
          check-latest: true

      - name: Check out code
        uses: actions/checkout@v4

      - name: Build
        run: CGO_ENABLED=0 go build -v .

      - name: Set up Docker
        uses: docker/setup-docker-action@v4

      - name: Verify Docker
        run: docker version

      - name: Test
        run: CGO_ENABLED=0 go test -v -coverprofile=coverage.out -covermode=atomic ./...

      - name: Test Matrix Conduit E2E
        run: CGO_ENABLED=0 SHOUTRRR_MATRIX_CONDUIT_E2E=1 go test -tags conduit_e2e -v ./pkg/services/matrix -run TestConduitE2E

      - name: Publish coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
